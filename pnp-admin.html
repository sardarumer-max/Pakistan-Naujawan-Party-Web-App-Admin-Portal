<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PNP Admin — Control Room</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#12253a;
    --ink-2:#1a3350;
    --paper:#f6f3ec;
    --paper-2:#ffffff;
    --moss:#2f6b4f;
    --moss-dark:#234f3a;
    --gold:#c9932c;
    --clay:#a8452f;
    --line:#e2ddce;
    --text:#26241f;
    --text-dim:#6b6a63;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);color:var(--text);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased}
  h1,h2,h3,.brand,.section-title{font-family:'Fraunces',serif}
  .mono{font-family:'IBM Plex Mono',monospace}

  /* ---- App shell ---- */
  .app{display:flex;min-height:100vh}

  /* Sidebar */
  .side{width:264px;flex-shrink:0;background:var(--ink);color:#dfe6ee;min-height:100vh;position:sticky;top:0;display:flex;flex-direction:column;transition:transform .3s ease}
  .side-head{padding:22px 20px 16px;border-bottom:1px solid rgba(255,255,255,.08)}
  .side-head .brand{font-size:21px;font-weight:600;color:#fff;letter-spacing:.2px;display:flex;align-items:center;gap:10px}
  .brand .mark{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--moss),var(--gold));display:inline-flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-weight:700;color:#0d1a29;font-size:15px}
  .side-head .sub{font-size:11.5px;color:#93a4b8;margin-top:5px;letter-spacing:.4px;text-transform:uppercase}

  .nav-scroll{overflow-y:auto;flex:1;padding:14px 10px 20px}
  .nav-label{font-size:10.5px;letter-spacing:1.2px;text-transform:uppercase;color:#6d7f95;padding:16px 12px 6px}
  .nav-label:first-child{padding-top:6px}
  .nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;color:#c9d3e0;text-decoration:none;font-size:14px;cursor:pointer;margin-bottom:2px;border:1px solid transparent}
  .nav-item .dot{width:20px;height:20px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;font-family:'IBM Plex Mono',monospace;flex-shrink:0;color:#0d1a29}
  .nav-item:hover{background:rgba(255,255,255,.06);color:#fff}
  .nav-item.active{background:rgba(255,255,255,.1);color:#fff;border-color:rgba(255,255,255,.12)}
  .nav-item .count{margin-left:auto;font-size:11px;color:#8fa0b4;font-family:'IBM Plex Mono',monospace}

  .side-foot{padding:14px 20px;border-top:1px solid rgba(255,255,255,.08);font-size:12px;color:#7d8ea3}

  /* Main */
  .main{flex:1;min-width:0}
  .topbar{position:sticky;top:0;z-index:5;background:rgba(246,243,236,.9);backdrop-filter:blur(6px);border-bottom:1px solid var(--line);padding:14px 26px;display:flex;align-items:center;gap:16px}
  .menu-btn{display:none;background:none;border:1px solid var(--line);border-radius:8px;width:36px;height:36px;font-size:18px;cursor:pointer;color:var(--ink)}
  .search-box{flex:1;max-width:380px;position:relative}
  .search-box input{width:100%;padding:9px 12px 9px 34px;border-radius:9px;border:1px solid var(--line);background:var(--paper-2);font-size:13.5px;font-family:'Inter',sans-serif}
  .search-box input:focus{outline:2px solid var(--moss);outline-offset:1px}
  .search-box::before{content:"⌕";position:absolute;left:11px;top:6px;color:var(--text-dim);font-size:16px}
  .topbar-right{margin-left:auto;display:flex;align-items:center;gap:14px}
  .badge-btn{position:relative;background:none;border:1px solid var(--line);border-radius:9px;width:36px;height:36px;cursor:pointer;font-size:15px;color:var(--ink)}
  .badge-btn .pip{position:absolute;top:-4px;right:-4px;background:var(--clay);color:#fff;font-size:9.5px;border-radius:9px;padding:1px 4px;font-family:'IBM Plex Mono',monospace}
  .who{display:flex;align-items:center;gap:9px}
  .who .av{width:34px;height:34px;border-radius:50%;background:var(--moss);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:13px}
  .who .meta{line-height:1.25}
  .who .meta b{font-size:13px;display:block}
  .who .meta span{font-size:11.5px;color:var(--text-dim)}

  .content{padding:24px 26px 60px}
  .crumb{font-size:12px;color:var(--text-dim);margin-bottom:6px;letter-spacing:.3px}
  .page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:20px;flex-wrap:wrap}
  .page-head h1{font-size:26px;margin:0 0 4px;color:var(--ink);font-weight:600}
  .page-head p{margin:0;color:var(--text-dim);font-size:13.5px;max-width:560px}
  .primary-btn{background:var(--moss);color:#fff;border:none;padding:10px 16px;border-radius:9px;font-size:13.5px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif}
  .primary-btn:hover{background:var(--moss-dark)}
  .ghost-btn{background:none;border:1px solid var(--line);padding:9px 14px;border-radius:9px;font-size:13px;cursor:pointer;color:var(--ink)}

  /* Cards */
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;margin-bottom:26px}
  .card{background:var(--paper-2);border:1px solid var(--line);border-radius:12px;padding:16px 18px}
  .card .k{font-size:11.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--text-dim);display:flex;align-items:center;gap:7px}
  .card .k .sw{width:8px;height:8px;border-radius:2px}
  .card .v{font-family:'Fraunces',serif;font-size:29px;font-weight:600;margin-top:6px;color:var(--ink)}
  .card .d{font-size:12px;color:var(--moss-dark);margin-top:3px}
  .card .d.down{color:var(--clay)}

  /* Table */
  .panel{background:var(--paper-2);border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .panel-head{padding:14px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:between;gap:10px}
  .panel-head h3{margin:0;font-size:15px;font-weight:600;color:var(--ink)}
  .panel-head .n{margin-left:auto;font-size:12px;color:var(--text-dim);font-family:'IBM Plex Mono',monospace}
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  thead th{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--text-dim);padding:10px 18px;border-bottom:1px solid var(--line);white-space:nowrap}
  tbody td{padding:11px 18px;border-bottom:1px solid var(--line);color:var(--text)}
  tbody tr:last-child td{border-bottom:none}
  tbody tr:hover{background:#fbfaf6}
  .pill{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11.5px;font-weight:600}
  .pill.active,.pill.approved,.pill.resolved,.pill.open{background:#e4f1e8;color:var(--moss-dark)}
  .pill.pending,.pill.review{background:#fbf0dc;color:#8a621b}
  .pill.suspended,.pill.rejected,.pill.closed{background:#f5e2dd;color:var(--clay)}
  .row-actions{display:flex;gap:6px}
  .row-actions button{background:none;border:1px solid var(--line);border-radius:6px;padding:4px 9px;font-size:11.5px;cursor:pointer;color:var(--ink)}
  .row-actions button:hover{background:var(--paper)}
  .empty-row td{padding:26px 18px;text-align:center;color:var(--text-dim);font-size:13px}

  /* Settings form */
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;padding:20px}
  .field{display:flex;flex-direction:column;gap:6px}
  .field label{font-size:12px;color:var(--text-dim);font-weight:600}
  .field input,.field select{padding:9px 11px;border-radius:8px;border:1px solid var(--line);font-size:13.5px;font-family:'Inter',sans-serif}
  @media(max-width:640px){.form-grid{grid-template-columns:1fr}}

  .overlay{display:none;position:fixed;inset:0;background:rgba(15,25,40,.4);z-index:8}
  .overlay.show{display:block}

  @media(max-width:900px){
    .side{position:fixed;left:0;top:0;bottom:0;z-index:9;transform:translateX(-100%)}
    .side.show{transform:translateX(0)}
    .menu-btn{display:inline-block}
    .who .meta{display:none}
    .search-box{max-width:none}
  }
</style>
</head>
<body>
<div class="app">

  <aside class="side" id="side">
    <div class="side-head">
      <div class="brand"><span class="mark">PN</span> PNP Admin</div>
      <div class="sub">Control Room</div>
    </div>
    <nav class="nav-scroll" id="nav"></nav>
    <div class="side-foot">v0.9 prototype · not for production</div>
  </aside>

  <div class="overlay" id="overlay" onclick="closeSide()"></div>

  <div class="main">
    <div class="topbar">
      <button class="menu-btn" onclick="openSide()">&#9776;</button>
      <div class="search-box"><input id="globalSearch" placeholder="Search this table…" oninput="filterTable(this.value)"></div>
      <div class="topbar-right">
        <button class="badge-btn">&#128276;<span class="pip">6</span></button>
        <div class="who">
          <div class="av">SA</div>
          <div class="meta"><b>Super Admin</b><span>Owner access</span></div>
        </div>
      </div>
    </div>

    <div class="content" id="content"></div>

</div>

        ["YB-153","GreenLeaf Produce","Bilal Ahsan","Agri-trade","Multan","approved"],
        ["YB-149","PixelCraft Studio","Hamna Tariq","Design","Islamabad","open"],
      ]},
    { id:"tv", name:"Naujawan TV", tag:"TV", color:"#c9932c", desc:"Video content pending review before publishing to the Naujawan TV channel.",
      cols:["ID","Title","Creator","Category","Views","Status"],
      rows:[
        ["TV-905","How to file a CNIC correction","Ali Hamza","Explainer","12,400","open"],
        ["TV-902","Interview: young farmer entrepreneurs","Mariam Sohail","Interview","8,120","review"],

        ["TV-891","Street voices: Karachi transport","Mariam Sohail","Documentary","5,430","pending"],

    { id:"transparency", name:"Transparency Hub", tag:"TH", color:"#2f6b4f", desc:"Donations and public fund disbursements published for audit.",
      cols:["ID","Donor / Fund","Purpose","Amount (PKR)","District","Status"],
      rows:[
        ["TH-220","Anonymous donor","Flood relief","500,000","Kot Addu","resolved"],
        ["TH-217","PNP Community Fund","School supplies","180,000","Muzaffargarh","open"],
        ["TH-212","Corporate CSR — Zafar Textiles","Winter blankets","350,000","Quetta","review"],
        ["TH-208","Anonymous donor","Medical camp","240,000","Larkana","resolved"],

    { id:"settings", name:"Settings", tag:"ST", color:"#12253a" },
  ]},

// flatten for lookup
const moduleMap = {};
groups.forEach(g=>g.items.forEach(m=>moduleMap[m.id]=m));

/* ---------------- Static data for overview + built-ins ---------------- */
const overviewCards = [
  {k:"Users",v:"1,250",d:"+38 this week",color:"#2f6b4f"},
  {k:"Jobs (Rozgar)",v:"340",d:"+12 this week",color:"#c9932c"},
  {k:"Complaints",v:"52",d:"9 unresolved",color:"#a8452f",down:true},
  {k:"Voice ideas",v:"81",d:"+6 this week",color:"#c9932c"},
  {k:"Courses",v:"18",d:"3 closing soon",color:"#2f6b4f"},
  {k:"Businesses",v:"45",d:"+4 this week",color:"#c9932c"},
  {k:"Videos",v:"62",d:"5 in review",color:"#c9932c"},
  {k:"Donations",v:"₨2.1M",d:"this quarter",color:"#2f6b4f"},
];

const usersData = { cols:["ID","Name","City","Programs used","Joined","Status"], rows:[
  ["U-2201","Ayesha Raheel","Lahore","Saathi, Voice","Mar 2025","active"],
  ["U-2198","Usman Tariq","Multan","Saathi","Feb 2025","active"],
  ["U-2190","Rubina Bibi","Karachi","Pakistan Problems","Jan 2025","active"],
  ["U-2184","Ghulam Rasool","Sahiwal","Kisaan Portal","Dec 2024","active"],
  ["U-2177","Danish Malik","Lahore","Business Hub","Nov 2024","suspended"],
  ["U-2169","Nazia Parveen","Bahawalpur","Kisaan Portal","Nov 2024","active"],
]};

const adminsData = { cols:["ID","Name","Role","Manages","Last active","Status"], rows:[

  ["2","Bilal Khan","Saathi Lead","PNP Saathi","2h ago","active"],
  ["3","Sana Malik","Program Manager","Rozgar, Skill Pakistan","1d ago","active"],
  ["4","Adv. Saima Riaz","Legal Lead","Qaanoon","3d ago","active"],
  ["5","Zara Sheikh","Moderator","Naujawan Voice, TV","5d ago","suspended"],
]};

const notifData = { cols:["ID","Message","Module","Sent","Status"], rows:[
  ["N-441","3 new complaints need triage","Pakistan Problems","10 min ago","open"],
  ["N-440","Course seats full: Digital Marketing 101","Skill Pakistan","1h ago","closed"],
  ["N-439","High priority safety report filed","Mahfooz","2h ago","open"],
  ["N-438","Flood warning acknowledged by 10 responders","Emergency Network","4h ago","resolved"],

/* ---------------- Render ---------------- */
let currentModule = "dashboard";

function buildNav(){
  const nav = document.getElementById('nav');
  nav.innerHTML = groups.map(g => `
    <div class="nav-label">${g.label}</div>
    ${g.items.map(m => `
      <div class="nav-item ${m.id===currentModule?'active':''}" data-id="${m.id}" onclick="goTo('${m.id}')">
        <span class="dot" style="background:${m.color}">${m.tag}</span>
        <span>${m.name}</span>
        ${m.rows ? `<span class="count">${m.rows.length}</span>` : ''}
      </div>
    `).join('')}
  `).join('');
}

function goTo(id){
  currentModule = id;
  buildNav();
  render();
  closeSide();
  document.getElementById('globalSearch').value = '';
}

function pill(status){
  return `<span class="pill ${status}">${status}</span>`;
}

function renderTable(cols, rows, emptyLabel){
  if(!rows.length){
    return `<table><tbody><tr class="empty-row"><td colspan="${cols.length}">No records yet — ${emptyLabel || 'nothing to show here.'}</td></tr></tbody></table>`;
  }
  return `
  <table id="dataTable">
    <thead><tr>${cols.map(c=>`<th>${c}</th>`).join('')}${'<th></th>'}</tr></thead>
    <tbody>
      ${rows.map(r => `<tr>${r.map((cell,i)=>{
          const isStatusCol = i === r.length-1 && /^(active|suspended|open|closed|pending|review|approved|rejected|resolved)$/.test(cell);
          return `<td>${isStatusCol ? pill(cell) : cell}</td>`;
        }).join('')}<td class="row-actions"><button>View</button><button>Edit</button></td></tr>`).join('')}
    </tbody>
  </table>`;
}

function render(){
  const m = moduleMap[currentModule];
  const content = document.getElementById('content');

  if(currentModule === 'dashboard'){
    content.innerHTML = `
      <div class="crumb">Overview</div>
      <div class="page-head">
        <div><h1>Dashboard</h1><p>Snapshot across all sixteen PNP programs, updated live as citizens submit requests.</p></div>
        <button class="primary-btn">Export summary</button>
      </div>
      <div class="cards">
        ${overviewCards.map(c=>`
          <div class="card">
            <div class="k"><span class="sw" style="background:${c.color}"></span>${c.k}</div>
            <div class="v">${c.v}</div>
            <div class="d ${c.down?'down':''}">${c.d}</div>
          </div>`).join('')}
      </div>
      <div class="panel">
        <div class="panel-head"><h3>Recent activity</h3><span class="n">last 24 hours</span></div>
        ${renderTable(notifData.cols, notifData.rows)}
      </div>`;
    return;
  }

  if(currentModule === 'users'){
    content.innerHTML = pageShell('Users','People registered across the PNP platform.', usersData);
    return;
  }
  if(currentModule === 'admins'){
    content.innerHTML = pageShell('Admins','Staff and program leads with panel access.', adminsData, 'Invite admin');
    return;
  }
  if(currentModule === 'notifications'){
    content.innerHTML = pageShell('Notifications','System alerts routed to the admin team.', notifData);
    return;
  }
  if(currentModule === 'settings'){
    content.innerHTML = `
      <div class="crumb">System</div>
      <div class="page-head"><div><h1>Settings</h1><p>Prototype only — nothing here is saved.</p></div></div>
      <div class="panel">
        <div class="form-grid">
          <div class="field"><label>Platform name</label><input value="Pakistan Naujawan Program"></div>
          <div class="field"><label>Support email</label><input value="admin@pnp.org.pk"></div>
          <div class="field"><label>Default language</label><select><option>English</option><option>Urdu</option></select></div>
          <div class="field"><label>Time zone</label><select><option>PKT (UTC+5)</option></select></div>
        </div>
        <div style="padding:0 20px 20px"><button class="primary-btn">Save changes</button> <button class="ghost-btn">Cancel</button></div>
      </div>`;
    return;
  }

  // program module with data
  content.innerHTML = pageShell(m.name, m.desc, {cols:m.cols, rows:m.rows}, null, m.color, m.tag);
}

function pageShell(title, desc, data, actionLabel, color, tag){
  return `
    <div class="crumb">${groups.find(g=>g.items.some(i=>i.name===title))?.label || ''}</div>
    <div class="page-head">
      <div><h1>${tag?`<span style="color:${color}">${tag}</span> · `:''}${title}</h1><p>${desc||''}</p></div>
      ${actionLabel ? `<button class="primary-btn">${actionLabel}</button>` : `<button class="primary-btn">Add new</button>`}
    </div>
    <div class="panel">
      <div class="panel-head"><h3>${title} records</h3><span class="n">${data.rows.length} total</span></div>
      ${renderTable(data.cols, data.rows, `no entries submitted for ${title} yet.`)}
    </div>`;
}

function filterTable(q){
  const table = document.getElementById('dataTable');
  if(!table) return;
  q = q.trim().toLowerCase();
  [...table.tBodies[0].rows].forEach(row=>{
    if(row.classList.contains('empty-row')) return;
    const text = row.textContent.toLowerCase();
    row.style.display = text.includes(q) ? '' : 'none';
  });
}

function openSide(){ document.getElementById('side').classList.add('show'); document.getElementById('overlay').classList.add('show'); }
function closeSide(){ document.getElementById('side').classList.remove('show'); document.getElementById('overlay').classList.remove('show'); }

buildNav();
render();
</script>
</body>
</html>
